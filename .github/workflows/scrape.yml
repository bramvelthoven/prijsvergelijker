name: Daily Scrape & Deploy

on:
  schedule:
    # Run daily at 05:00 UTC (06:00 Amsterdam time in winter, 07:00 in summer)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore database cache
        uses: actions/cache@v4
        id: db-cache
        with:
          path: prices.db
          key: prices-db-${{ github.run_number }}
          restore-keys: |
            prices-db-

      - name: Download seed database (first run only)
        if: steps.db-cache.outputs.cache-hit != 'true'
        run: |
          if gh release view seed-db --json assets -q '.assets[].name' 2>/dev/null | grep -q prices.db; then
            echo "Downloading seed database from release..."
            gh release download seed-db -p prices.db --clobber
            echo "Seed database restored ($(du -h prices.db | cut -f1))"
          else
            echo "No seed database found — starting fresh"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: node scrape.js
        env:
          CI: true
        continue-on-error: true
        id: scrape

      - name: Report scraper status
        run: |
          if [ "${{ steps.scrape.outcome }}" = "failure" ]; then
            echo "::warning::Scraper had errors — using cached data for site generation"
          fi
          if [ -f prices.db ]; then
            node -e "
              const db = require('better-sqlite3')('prices.db');
              const products = db.prepare('SELECT COUNT(*) as c FROM products').get().c;
              const prices = db.prepare('SELECT COUNT(*) as c FROM prices').get().c;
              console.log('Database: ' + products + ' products, ' + prices + ' price records');
              if (products === 0) {
                console.log('::error::Database has 0 products — cannot generate site');
                process.exit(1);
              }
            "
          else
            echo "::error::No database file — nothing to generate"
            exit 1
          fi

      - name: Generate static site
        run: node generate-site.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web/public/data/ web/public/vergelijk/ web/public/categorie/ web/public/categorieen/ web/public/over/ web/public/privacy/ web/public/sitemap.xml web/public/robots.txt
          git diff --cached --quiet && echo "No data changes" && exit 0
          git commit -m "data: $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
